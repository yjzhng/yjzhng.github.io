<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != '/' %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Set the chosen theme before first paint to avoid a flash. -->
  <script>(function(){var t;try{t=localStorage.getItem('theme');}catch(e){}document.documentElement.setAttribute('data-theme',t||'auto');})();</script>

  <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="icon" href="{{ '/images/favicon-32x32.png' | relative_url }}" sizes="32x32">
  <link rel="apple-touch-icon" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">

  <!-- Icons: Font Awesome (brands/solid) + Academicons (scholar, orcid) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1.9.4/css/academicons.min.css">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
</head>
